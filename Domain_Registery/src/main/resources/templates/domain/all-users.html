<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h2>All Users</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.fullName}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
            <td th:text="${user.createdAt}"></td>
            <td>
          <span th:text="${user.active} ? 'Active' : 'Inactive'"
                th:classappend="${user.active} ? 'badge-active' : 'badge-expired'"
                class="badge">
          </span>
            </td>
            <td>
                <!-- Deactivate -->
                <form th:if="${user.active}"
                      th:action="@{/admin/users/{id}/deactivate(id=${user.id})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn-danger-small">Deactivate</button>
                </form>
                <!-- Activate -->
                <form th:unless="${user.active}"
                      th:action="@{/admin/users/{id}/activate(id=${user.id})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn-small">Activate</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
