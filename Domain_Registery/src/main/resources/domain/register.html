<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register Domain</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h2>Register a Domain</h2>

    <!-- Messages -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="form-card">
        <form th:action="@{/domains/register}" method="post">

            <div class="form-group">
                <label>Domain Name</label>
                <input
                        type="text"
                        name="domainName"
                        th:value="${domainName}"
                        placeholder="example.ca"
                        required
                />
                <small>Only .ca domains are supported</small>
            </div>

            <button type="submit" class="btn-primary">
                Register Domain
            </button>

            <a th:href="@{/domains/my}" class="btn-secondary">Cancel</a>

        </form>
    </div>
</div>

</body>
</html>
