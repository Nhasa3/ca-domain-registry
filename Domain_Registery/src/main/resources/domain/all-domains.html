<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Domains</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h2>All Domains</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table">
        <thead>
        <tr>
            <th>Domain</th>
            <th>Owner</th>
            <th>Status</th>
            <th>Registered</th>
            <th>Expires</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="domain : ${domains}">
            <td th:text="${domain.domainName}"></td>
            <td th:text="${domain.owner.fullName}"></td>
            <td>
          <span class="badge"
                th:text="${domain.status}"
                th:classappend="${domain.status == 'ACTIVE'} ? 'badge-active' : 'badge-expired'">
          </span>
            </td>
            <td th:text="${domain.registeredAt}"></td>
            <td th:text="${domain.expiresAt}"></td>
            <td>
                <form th:action="@{/admin/domains/{id}/delete(id=${domain.id})}"
                      method="post"
                      onsubmit="return confirm('Delete this domain?')">
                    <button type="submit" class="btn-danger-small">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
